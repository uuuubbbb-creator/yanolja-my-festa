<!-- 캐릭터 이미지 -->
<div style="max-width:960px;margin:0 auto;padding:0 24px 32px;display:grid;grid-template-columns:340px 1fr;gap:48px;align-items:start;">
  <div style="text-align:center;">
    <img id="trCharImg" src="" alt="" style="width:100%;border-radius:20px;object-fit:cover;aspect-ratio:3/4;background:#f1f5f9;">
  </div>
  <div>
    <!-- 콤보 뱃지 -->
    <div class="tr-combo-badge" style="margin-bottom:12px;">
      <span class="combo-dot"></span>
      <span id="trComboBadge">스타력 × 유교력</span>
    </div>
    <!-- 유형명 -->
    <div class="tr-type-name" id="trTypeName" style="margin-bottom:8px;">조선디제이</div>
    <!-- 태그라인 -->
    <div class="tr-type-sub" id="trTypeTagline" style="margin-bottom:28px;font-size:14px;opacity:.7;line-height:1.6;">"흠을 선율에 담아 조선의 밤을 깨운다"</div>
    <!-- 게이지 차트 -->
    <div class="tr-gauge-grid" id="trGaugeGrid"></div>
  </div>
</div>

<!-- 나에게 꼭 맞는 축제 -->
<div style="max-width:960px;margin:0 auto;padding:0 24px 32px;">
  <p style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.8px;margin-bottom:14px;">나에게 꼭 맞는 축제!</p>
  <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;" id="trFestCards"></div>
</div>

<!-- 이 유형에게 어울리는 스타일 -->
<div id="trStyleMatch" style="max-width:960px;margin:0 auto;padding:0 24px 40px;">
  <div style="margin-bottom:16px;">
    <p style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;">이 유형에게 어울리는 축제 스타일</p>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span id="trStyleLabel" style="background:#eef2ff;color:#4f46e5;font-size:13px;font-weight:800;padding:6px 16px;border-radius:100px;"></span>
      <span id="trStyleDesc" style="font-size:12px;color:#64748b;font-weight:500;"></span>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;" id="trStyleCards"></div>
</div>
